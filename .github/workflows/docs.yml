# Build the MkDocs Material site and deploy it to GitHub Pages.
#
# Trigger:
#   - Push to master / main → rebuild + redeploy.
#   - Tagged release → rebuild + redeploy (so the docs version on the
#     site matches the latest released wheel).
#   - Manual via Actions tab.
#
# The build step has to install the Rust extension because the API
# reference (mkdocstrings) imports `invisensing` to introspect its
# docstrings. We build a wheel via maturin-action (which handles the
# venv / Rust toolchain) and `pip install` it — `maturin develop`
# itself refuses to install into the system Python on a fresh GitHub
# runner.
#
# Deployment uses the official `actions/deploy-pages` flow (replaces
# the legacy `peaceiris/actions-gh-pages` action) — site is served at
# https://invisensing-io.github.io/python-lib/.
#
# Requires GitHub Pages "Source" set to "GitHub Actions" in
# Settings → Pages (not "Deploy from a branch").

name: Deploy documentation

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Build the wheel via maturin-action (handles venv + Rust
      # toolchain + manylinux container). Output is in target/wheels/.
      - name: Build invisensing wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --interpreter python3.12 --out target/wheels
          manylinux: auto
          sccache: true

      # Install the freshly-built wheel + the docs dependencies. We
      # use `pip install --find-links` rather than `maturin develop`
      # because the latter requires a venv that doesn't exist on the
      # bare runner.
      - name: Install wheel + docs deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install --find-links target/wheels invisensing
          python -m pip install mkdocs mkdocs-material "mkdocstrings[python]" pymdown-extensions black

      - name: Build MkDocs site
        run: mkdocs build --strict --site-dir site

      - name: Upload site as Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
