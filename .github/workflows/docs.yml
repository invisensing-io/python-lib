# Build the MkDocs Material site and deploy it to GitHub Pages.
#
# Trigger:
#   - Push to master / main → rebuild + redeploy.
#   - Tagged release → rebuild + redeploy (so the docs version on the
#     site matches the latest released wheel).
#   - Manual via Actions tab.
#
# The build step has to install the Rust extension because the API
# reference (mkdocstrings) imports `invisensing` to introspect its
# docstrings. `maturin develop --release` handles that.
#
# Deployment uses the official `actions/deploy-pages` flow (replaces
# the legacy `peaceiris/actions-gh-pages` action) — site is served at
# https://invisensing-io.github.io/python-lib/.

name: Deploy documentation

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      # The docs build (mkdocstrings) imports `invisensing` to read
      # the live docstrings, so the Rust extension must be installed
      # first. `--release` keeps the build under 2 minutes thanks to
      # the smaller debug-info footprint.
      - name: Build + install the Rust extension
        run: maturin develop --release

      - name: Install docs deps
        run: python -m pip install ".[docs]"

      - name: Build MkDocs site
        run: mkdocs build --strict --site-dir site

      - name: Upload site as Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
